server:
  port: 8080

spring:
  application:
    name: library-management-backend

  datasource:
    url: jdbc:mysql://localhost:3306/genius_tech_library_db?useSSL=false&serverTimezone=UTC
    username: root
    password: abhi
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: http://localhost:3000
  bootstrap:
    admin:
      name: Genius
      email: admin@genius.tech
      password: genius
  loan:
    duration-days: 14
  fine:
    amount-per-day: 10.0
